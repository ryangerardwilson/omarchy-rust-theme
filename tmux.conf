set -g status-style "bg=default,fg=#9f3a32"
set -g status-left "#[fg=#3a0f12,bg=#e3a19a,bold] #S #[fg=#9f3a32,bg=default] "
set -g status-right "#[fg=#a52d24]#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=#9f3a32]#h "
set -g window-status-format "#[fg=#a52d24] #I:#W "
set -g window-status-current-format "#[fg=#3a0f12,bg=#e3a19a,bold] #I:#W #[fg=#9f3a32,bg=default]"
set -g pane-border-style "fg=#a52d24"
set -g pane-active-border-style "fg=#3a0f12"
set -g message-style "bg=#f3d1cb,fg=#3a0f12"
set -g message-command-style "bg=#f3d1cb,fg=#3a0f12"
set -g mode-style "bg=#e3a19a,fg=#3a0f12"
set -g popup-style "bg=#f3d1cb,fg=#3a0f12"
set -g popup-border-style "fg=#a52d24,bg=#f3d1cb"
set -g menu-style "bg=#f3d1cb,fg=#3a0f12"
set -g menu-selected-style "bg=#e3a19a,fg=#3a0f12"
setw -g clock-mode-colour "#a52d24"
