set -g status-style "bg=default,fg=#6b4331"
set -g status-left "#[fg=#2f1f17,bg=#d9b39d,bold] #S #[fg=#6b4331,bg=default] "
set -g status-right "#[fg=#9b5a36]#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=#6b4331]#h "
set -g window-status-format "#[fg=#9b5a36] #I:#W "
set -g window-status-current-format "#[fg=#2f1f17,bg=#d9b39d,bold] #I:#W #[fg=#6b4331,bg=default]"
set -g pane-border-style "fg=#9b5a36"
set -g pane-active-border-style "fg=#2f1f17"
set -g message-style "bg=#ead7c8,fg=#2f1f17"
set -g message-command-style "bg=#ead7c8,fg=#2f1f17"
set -g mode-style "bg=#d9b39d,fg=#2f1f17"
set -g popup-style "bg=#ead7c8,fg=#2f1f17"
set -g popup-border-style "fg=#9b5a36,bg=#ead7c8"
set -g menu-style "bg=#ead7c8,fg=#2f1f17"
set -g menu-selected-style "bg=#d9b39d,fg=#2f1f17"
setw -g clock-mode-colour "#9b5a36"
